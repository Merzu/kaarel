<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaarel Leetsaar - Portfoolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Modernne minimalistlik värvipalett */
        :root { --accent-main: #3d8bff; --bg-off-white: #fafafa; --bg-white: #ffffff; --text-dark: #2a2a2a; --text-medium: #666; --text-light: #fcfcfc; --border-light: #e8e8e8; --shadow: 0 10px 30px rgba(0,0,0,0.03); --rounded: 12px; }
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background-color: var(--bg-off-white); color: var(--text-dark); line-height: 1.7; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background-color: var(--bg-white); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); padding: 1.2rem 0; transition: all 0.3s ease; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; gap: 2.5rem; flex-wrap: wrap; }
        nav a { color: var(--text-dark); text-decoration: none; font-weight: 500; font-size: 1.05rem; transition: color 0.3s ease; }
        nav a:hover, .active { color: var(--accent-main); }
        .active { font-weight: 700; position: relative; }
        .active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background-color: var(--accent-main); border-radius: 2px; }
        header { text-align: center; padding: 6rem 1rem 4rem 1rem; background: linear-gradient(135deg, var(--bg-white) 0%, var(--bg-off-white) 100%); border-bottom: 1px solid var(--border-light); margin-bottom: 3rem; }
        header h1 { margin: 0; font-size: 3.2rem; font-weight: 700; color: var(--text-dark); letter-spacing: -1px; }
        header p { color: var(--text-medium); font-size: 1.3rem; margin-top: 0.8rem; font-weight: 300; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; flex: 1; }
        section { margin-bottom: 5rem; background: var(--bg-white); padding: 3rem; border-radius: var(--rounded); box-shadow: var(--shadow); position: relative; text-align: left; }
        h2 { font-size: 1.8rem; color: var(--text-dark); border-bottom: 2px solid var(--border-light); padding-bottom: 0.8rem; margin-bottom: 2rem; font-weight: 600; text-align: left; }
        .info-list { list-style: none; padding: 0; text-align: left; }
        .info-list li { margin-bottom: 1rem; }
        .container a { color: var(--accent-main); text-decoration: none; font-weight: 500; }
        .container a:hover { text-decoration: underline; }
        footer { text-align: center; padding: 2.5rem 1rem; color: var(--text-medium); font-size: 0.9rem; margin-top: 2rem; background-color: var(--bg-white); border-top: 1px solid var(--border-light); position: relative; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Minust</a></li>
            <li><a href="portfolio.html">Tehtud tööd</a></li>
            <li><a href="haridus.html">Haridus</a></li>
            <li><a href="kontakt.html" class="active">Kontakt</a></li>
        </ul>
    </nav>
    <header>
        <h1>Kaarel Leetsaar</h1>
        <p>Graafiline Disainer & Fotograaf</p>
    </header>
    <div class="container">
        <section id="contact">
            <h2>Kontakt</h2>
            <p>Kui soovid koostööd teha või lihtsalt tere öelda, võta julgelt ühendust:</p>
            <ul class="info-list">
                <li>📧 E-post: <a href="mailto:kaarel.leetsaar@voco.ee">kaarel.leetsaar@voco.ee</a></li>
            </ul>
        </section>
    </div>
    <footer>
        <p>&copy; 2026 Kaarel Leetsaar. Kõik õigused kaitstud.</p>
    </footer>
</body>
</html>
